name: 💡 Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Describe the idea
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
    validations:
      required: false
